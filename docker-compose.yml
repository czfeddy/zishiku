services:
  app:
    build: .
    restart: unless-stopped
    depends_on:
      - redis
    env_file:
      - .env
    environment:
      PORT: 3000
    volumes:
      - ./data:/app/data
      - ./public/uploads:/app/public/uploads

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
  redis_data:
